<!DOCTYPE html>
<html>
<head>
    <title>Faculty Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard-container">

    <div class="top-bar">

        <div class="college-info">

            <img
                src="ycce_logo.jfif"
                alt="YCCE Logo"
                class="logo"
            >

            <div>

                <h2>
                    YCCE Answer Sheet Scanner
                </h2>

                <p>
                    Faculty Evaluation Dashboard
                </p>

            </div>

        </div>

        <div class="faculty-box">

            Faculty ID:
            <span id="facultyId"></span>

        </div>

    </div>

    <div class="dashboard-card">

        <h1>
            Faculty Dashboard
        </h1>

        <p class="subtitle">
            Select Session and Subject to Continue
        </p>

        <label>
            Academic Session
        </label>

        <select id="session">

            <option>2025-2026</option>
            <option>2024-2025</option>
            <option>2023-2024</option>
            <option>2022-2023</option>
            <option>2021-2022</option>
            <option>2020-2021</option>
            <option>2019-2020</option>
            <option>2018-2019</option>

        </select>

        <label>
            Subject
        </label>

        <select id="subject">

    <option>
        Machine Learning (22IT401)
    </option>

    <option>
        Operating Systems (22IT402)
    </option>

    <option>
        Computer Networks (22IT403)
    </option>

    <option>
        Database Management Systems (22IT404)
    </option>

    <option>
        Software Engineering (22IT405)
    </option>

    <option>
        Artificial Intelligence (22IT406)
    </option>

    <option>
        Data Mining and Warehousing (22IT407)
    </option>

    <option>
        Cloud Computing (22IT408)
    </option>

    <option>
        Cyber Security (22IT409)
    </option>

    <option>
        Web Technology (22IT410)
    </option>

    <option>
        Mobile Application Development (22IT411)
    </option>

    <option>
        Compiler Design (22IT412)
    </option>

    <option>
        Design and Analysis of Algorithms (22IT413)
    </option>

    <option>
        Object Oriented Programming (22IT414)
    </option>

    <option>
        Data Structures (22IT415)
    </option>

    <option>
        Computer Graphics (22IT416)
    </option>

    <option>
        Internet of Things (22IT417)
    </option>

    <option>
        Blockchain Technology (22IT418)
    </option>

    <option>
        Deep Learning (22IT419)
    </option>

    <option>
        Natural Language Processing (22IT420)
    </option>

</select>

        <div class="button-group">

            <button id="backBtn">
                ← Back
            </button>

            <button id="scanBtn">
                📄 Scan Answer Sheet
            </button>

            <button id="downloadBtn">
                📊 Download Excel
            </button>

        </div>

    </div>

</div>

<footer>

    © 2026 Yeshwantrao Chavan College of Engineering, Nagpur

</footer>

<script src="js/dashboard.js"></script>

</body>
</html>

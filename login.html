<!DOCTYPE html>
<html>
<head>
    <title>YCCE Answer Sheet Scanner</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-container">

    <div class="login-card">

        <img
            src="ycce_logo.jfif"
            alt="YCCE Logo"
            class="logo"
        >

        <h1>
            YCCE Answer Sheet Scanner
        </h1>

        <h3>
            Faculty Login Portal
        </h3>

        <input
            type="text"
            id="facultyId"
            placeholder="Faculty ID"
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
        >

        <button id="loginBtn">
            Login
        </button>

    </div>

</div>

<footer>

    <p>
        © 2026 Yeshwantrao Chavan College of Engineering, Nagpur
    </p>

    <p>
        Answer Sheet Evaluation & Result Processing System
    </p>

    <p>
        Developed for Academic Use
    </p>

</footer>

<script src="js/login.js"></script>

</body>
</html>
